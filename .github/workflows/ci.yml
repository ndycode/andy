name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the gated DB-layer integration tests (queries.integration.test.ts).
    # Without this the integration suite only ever runs on a developer's machine; here it gates
    # every push — the claim/flush/dedup concurrency design is the most correctness-critical code.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: andy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Integration tests (DB layer vs real Postgres)
        # The integration suite is gated behind TEST_DATABASE_URL; it migrates the schema in beforeAll
        # then exercises queries.ts against the service container above. The main Test step (no
        # TEST_DATABASE_URL) skips it, so this is the only place it runs in CI.
        run: bun test packages/db/src/queries.integration.test.ts
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/andy_test

      - name: Build (production Vercel bundle)
        # Exercises the real Build Output API bundle (build-vercel.sh) so a bundling/import failure
        # is caught in CI, not at deploy. No secrets needed — this is a pure bundle, no DB connection.
        run: bun run build
