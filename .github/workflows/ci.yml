name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs (and runs when a push didn't auto-trigger)

# Least privilege: this workflow only checks out and builds — it needs no write scopes on GITHUB_TOKEN.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the gated DB-layer integration tests (the *.integration.test.ts suites:
    # claim/flush/dedup, money-write appliers, goal-balance deltas). Without this the integration
    # suite only ever runs on a developer's machine; here it gates every push — the claim/flush/dedup
    # concurrency design is the most correctness-critical code.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: andy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Lint (no-excuse rules — repo-specific custom linter)
        run: bun run lint:no-excuse

      - name: Test (unit + DB-layer integration vs real Postgres)
        # bun test auto-discovers every *.test.ts. The describeDbIntegration blocks (claim/flush/dedup,
        # money-write appliers, goal-balance deltas) activate ONLY when TEST_DATABASE_URL is set, so
        # setting it here runs the full unit + integration gate in a single pass against the service
        # container above — no per-file path that can silently rot when a test file is renamed.
        run: bun test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/andy_test

      - name: Build (production Vercel bundle)
        # Exercises the real Build Output API bundle (build-vercel.sh) so a bundling/import failure
        # is caught in CI, not at deploy. No secrets needed — this is a pure bundle, no DB connection.
        run: bun run build
