name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build (production Vercel bundle)
        # Exercises the real Build Output API bundle (build-vercel.sh) so a bundling/import failure
        # is caught in CI, not at deploy. No secrets needed — this is a pure bundle, no DB connection.
        run: bun run build
