name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual run button

# least privilege: checkout, build, no write scopes.
permissions:
  contents: read

# cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    # ephemeral Postgres for gated DB integration: claim/flush/dedup, money writes, goal deltas.
    # this keeps money correctness checked on every push.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: andy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Lint (no-excuse rules, repo-specific custom linter)
        run: bun run lint:no-excuse

      - name: Test (unit + DB-layer integration vs real Postgres)
        # bun test auto-discovers every *.test.ts. DB suites wake up when TEST_DATABASE_URL is set,
        # so CI runs the real integration gate without fragile per-file test paths.
        run: bun test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/andy_test

      - name: Build (production Vercel bundle)
        # exercises the real Build Output API bundle. no secrets, no DB connection.
        run: bun run build
