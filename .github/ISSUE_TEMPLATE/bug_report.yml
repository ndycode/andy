name: bug report
description: something is wrong in logic, money math, build, or tests.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        thanks for the report. do not include real secrets, `.env` values, API keys, or phone
        numbers. for security issues, use
        [private vulnerability reporting](https://github.com/ndycode/andy/security/advisories/new).
  - type: textarea
    id: what-happened
    attributes:
      label: what happened?
      description: say what broke and what should have happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: steps to reproduce
      description: best case is a failing test, command, or tiny sequence.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: area
      options:
        - "packages/shared (money/time/budget/etc.)"
        - "packages/db (schema/queries/dedup)"
        - "packages/ai (agent/tools/model)"
        - "apps/api (handler/cron/sendblue)"
        - "tooling/CI/build"
        - "docs"
        - "not sure"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: environment
      description: output of `bun --version` and your OS, if relevant.
    validations:
      required: false
