name: question or idea
description: ask about the design, or suggest a small improvement.
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        andy is a personal showcase. design questions and small ideas are welcome.
        self-hosting and multi-user product requests are out of scope.
  - type: textarea
    id: body
    attributes:
      label: your question or idea
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: context
      description: link the relevant file or section if it helps.
    validations:
      required: false
