# Dependabot — https://docs.github.com/code-security/dependabot
# Keeps dependencies and CI actions current. Updates are GROUPED and weekly to avoid a flood of PRs;
# review and let CI (typecheck · lint · test · build · DB integration) gate each batch before merge.
version: 2
updates:
  # JS dependencies across the Bun workspaces (root + apps/* + packages/*). The "bun" ecosystem
  # updates bun.lock too, so a bump won't drift the lockfile and break CI's `bun install
  # --frozen-lockfile`. (If your Dependabot doesn't support "bun" yet, switch to "npm" and add a
  # bun.lock-refresh step, or manage JS bumps manually.)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # One PR for routine non-breaking bumps; majors come as their own PRs to debug in isolation.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "ci"
      - "dependencies"
