<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Andy Demo</title>
    <meta
      name="description"
      content="A playable iMessage demo of Andy, a personal finance assistant."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --fg: #151515;
        --muted: #5b5b55;
        --line: #d8d7ce;
        --accent: #0a7cff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      .wrap {
        width: min(100%, 430px);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(2rem, 9vw, 3.2rem);
        line-height: 1;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 23 / 36;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111;
      }

      .links {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      a {
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="wrap" aria-labelledby="demo-title">
        <p class="eyebrow">Andy demo</p>
        <h1 id="demo-title">iMessage finance assistant</h1>
        <video controls playsinline preload="metadata" poster="/demo/messages-poster.jpg">
          <source src="/demo/messages.mp4" type="video/mp4" />
          <track
            src="/demo/messages.vtt"
            kind="captions"
            srclang="en"
            label="English"
          />
          <a href="/demo/messages.mp4">Open the demo video</a>
        </video>
        <div class="links">
          <a href="/">Andy</a>
          <a href="/demo/messages.mp4">MP4</a>
        </div>
      </section>
    </main>
  </body>
</html>
